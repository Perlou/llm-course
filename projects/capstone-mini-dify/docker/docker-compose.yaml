# docker/docker-compose.yaml
version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-dify-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mini_dify
      - POSTGRES_USER=mini_dify
      - POSTGRES_PASSWORD=mini_dify_secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mini_dify"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4-latest
    container_name: mini-dify-milvus
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      - ETCD_USE_EMBED=true
      - COMMON_STORAGETYPE=local
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: mini-dify-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mini_dify:mini_dify_secret@postgres:5432/mini_dify
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
    volumes:
      - ../data/uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: mini-dify-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  milvus_data:
